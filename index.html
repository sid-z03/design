<!DOCTYPE html>
<html>
<head>
<title>Azeem - Director of Photography</title>
<style>
  /* Basic Reset & Base Styles */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #eee; font-family: sans-serif; line-height: 1.6; }
  .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  /* Hero Section */
  .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
  .hero h1 { font-size: 4rem; margin-bottom: 0.5rem; }
  .hero p { font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; color: #aaa;}

  /* Project Grid */
  .projects-section { margin: 5rem 0; }
  .category-title { font-size: 1.5rem; margin-bottom: 2rem; padding-bottom: 0.5rem; border-bottom: 1px solid #333; text-transform: uppercase; letter-spacing: 2px; }
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; margin-bottom: 4rem; }
  .project-item { cursor: pointer; }
  .project-thumb { background: #222; aspect-ratio: 16/9; margin-bottom: 0.5rem; overflow: hidden; }
  .project-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
  .project-item:hover .project-thumb img { transform: scale(1.05); }
  .project-title { font-weight: bold; }
  .project-client { font-size: 0.8rem; color: #aaa; }

  /* Showreel Section */
  .showreel { margin: 5rem 0; }
  .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
  .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

  /* Footer / Contact */
  .footer { margin-top: 5rem; padding-top: 2rem; border-top: 1px solid #333; text-align: center; }
  .footer a { color: #aaa; text-decoration: none; margin: 0 1rem; }
  .footer a:hover { color: #fff; }

  @media (max-width: 768px) {
    .project-grid { grid-template-columns: 1fr; }
    .container { padding: 1rem; }
    .hero h1 { font-size: 2.5rem; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Hero Section (Inspired by Fraser/Tamburini) -->
  <section class="hero">
    <h1>AZEEM MOHAMMAD</h1>
    <p>Director of Photography</p>
    <!-- Optional: Add a background video or image here -->
  </section>

  <!-- Showreel Section (Essential for DOP) -->
  <section class="showreel">
    <div class="video-wrapper">
      <!-- Replace with your YouTube/Vimeo embed code -->
      <iframe src="https://www.youtube.com/embed/mV9BBwKsSp8?si=YOUR_REEL_ID" title="Showreel" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </section>

  <!-- Commercial Work Section (Inspired by Tamburini) -->
  <section class="projects-section">
    <h2 class="category-title">Commercial</h2>
    <div class="project-grid">
      <!-- Project 1 -->
      <div class="project-item">
        <div class="project-thumb">
          <img src="https://placehold.co/600x400/333/fff?text=Brand+Campaign" alt="Project Thumbnail">
        </div>
        <div class="project-title">Bound By Nothing</div>
        <div class="project-client">JENNAIR · Launch Trailer</div>
      </div>
      <!-- Add more commercial projects here -->
    </div>
  </section>

  <!-- Music Video Section (Inspired by Tamburini/Lyubimov) -->
  <section class="projects-section">
    <h2 class="category-title">Music Video</h2>
    <div class="project-grid">
      <!-- Project 1 -->
      <div class="project-item">
        <div class="project-thumb">
          <img src="https://placehold.co/600x400/333/fff?text=Artist+Name" alt="Project Thumbnail">
        </div>
        <div class="project-title">Travel By Design</div>
        <div class="project-client">MARRIOTT · Global Campaign</div>
      </div>
      <!-- Add more music video projects here -->
    </div>
  </section>

  <!-- Footer / Contact (Inspired by Tamburini) -->
  <footer class="footer">
    <div>
      <a href="mailto:hello@azeem.com">EMAIL</a>
      <a href="#">INSTAGRAM</a>
      <a href="#">IMDB</a>
    </div>
    <p style="margin-top: 2rem; font-size: 0.7rem;">© 2024 Azeem Mohammad</p>
  </footer>

</div>
</body>
</html>
